server:
  address: "127.0.0.1:8080"

signal:
  data_dir: "/var/lib/signal-gateway"
  attachments_dir: "/var/lib/signal-gateway/attachments"
  command_channel_capacity: 64
  message_broadcast_capacity: 256
  command_timeout_ms: 30000
  max_sends_per_second: 5

# webhook: DISABLED - OpenClaw Signal channel uses SSE (Server-Sent Events) instead
# OpenClaw consumes messages via GET /api/v1/events, not webhook POST
# webhook:
#   url: "http://127.0.0.1:18789/hooks/agent"
#   token: "signal-gateway-webhook-secret-2026"
#   retry_attempts: 3
#   retry_delay_ms: 1000
