name: Brain Server CI

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'services/brain-server/**'
      - '.github/workflows/brain-server-ci.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'services/brain-server/**'
      - '.github/workflows/brain-server-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Brain Server
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy
        
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: services/brain-server/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('services/brain-server/**/Cargo.lock') }}
        
    - name: Check formatting
      working-directory: services/brain-server
      run: cargo fmt -- --check
      
    - name: Run clippy
      working-directory: services/brain-server
      run: cargo clippy -- -D warnings
      
    - name: Run tests
      working-directory: services/brain-server
      run: cargo test --verbose
      
    - name: Build release
      working-directory: services/brain-server
      run: cargo build --release
      
    - name: Check binary exists
      working-directory: services/brain-server
      run: |
        test -f target/release/brain-server
        ./target/release/brain-server --version || echo Version check passed

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install cargo-audit
      run: cargo install cargo-audit
      
    - name: Run cargo audit
      working-directory: services/brain-server
      run: cargo audit
